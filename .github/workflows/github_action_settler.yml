name: Tossify Telegram Auto Settler

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install telethon requests

      - name: Run Telegram Auto Settler
        env:
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION:  ${{ secrets.TELEGRAM_SESSION }}
          NODE_SERVER_URL:   ${{ secrets.NODE_SERVER_URL }}
          SCRAPER_SECRET:    ${{ secrets.SCRAPER_SECRET }}
        run: |
          cd scraper
          python telegram_auto_settler.py
