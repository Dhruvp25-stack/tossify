<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tossify Control Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080f1e;--card:#0d1830;--card2:#121f3a;--card3:#172444;
  --border:#1e2f52;--border2:#253868;
  --green:#3cb54a;--green2:#2fa03d;--green3:#278a34;
  --red:#e74c3c;--gold:#f0c040;--blue:#3d8ef0;
  --text:#d6e4f7;--muted:#5878a0;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
h2,h3{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;}
#loginScreen{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse at 20% 20%,rgba(60,181,74,.12) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,rgba(14,30,66,.8) 0%,transparent 60%),
             var(--bg);
}
.lcard{
  background:linear-gradient(145deg,var(--card),var(--card2));
  border:1px solid var(--border2);border-radius:20px;padding:36px 28px;
  width:100%;max-width:370px;box-shadow:0 24px 64px rgba(0,0,0,.6);
  position:relative;overflow:hidden;
}
.lcard::before{
  content:'';position:absolute;top:0;left:20px;right:20px;height:2px;
  background:linear-gradient(90deg,transparent,var(--green),var(--gold),transparent);
}
.lcard h2{font-size:30px;background:linear-gradient(135deg,var(--green),#7ae885);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.lcard p{color:var(--muted);font-size:12px;margin-bottom:22px;letter-spacing:.5px;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;}
.field input,.field select,.field textarea{
  width:100%;background:var(--bg);border:1.5px solid var(--border);
  border-radius:9px;padding:11px 13px;color:var(--text);font-size:14px;
  font-family:inherit;outline:none;transition:all .2s;
}
.field input:focus,.field select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(60,181,74,.1);}
.field select option{background:var(--card);}
.btn{
  padding:10px 18px;border-radius:9px;border:none;font-size:13px;
  font-weight:800;cursor:pointer;font-family:'Bebas Neue',sans-serif;
  letter-spacing:1px;transition:all .2s;
}
.btn-full{width:100%;}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green3));color:#fff;box-shadow:0 4px 16px rgba(60,181,74,.25);}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(60,181,74,.35);}
.btn-red{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.3);}
.btn-gold{background:rgba(240,192,64,.12);color:var(--gold);border:1px solid rgba(240,192,64,.3);}
.btn-blue{background:rgba(61,142,240,.12);color:var(--blue);border:1px solid rgba(61,142,240,.3);}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--muted);}
.btn-outline:hover{border-color:var(--green);color:var(--green);}
.msg{font-size:13px;padding:9px;border-radius:9px;margin-top:10px;display:none;text-align:center;font-weight:700;}
.msg.err{background:rgba(231,76,60,.12);color:var(--red);display:block;border:1px solid rgba(231,76,60,.25);}
#mainScreen{display:none;}
.header{
  background:linear-gradient(90deg,var(--card) 0%,var(--card2) 100%);
  border-bottom:1px solid var(--border2);
  padding:11px 18px;display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
  position:relative;
}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(60,181,74,.4),transparent);}
.header h2{font-size:20px;background:linear-gradient(135deg,var(--green),#7ae885);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hlive{font-size:12px;background:rgba(60,181,74,.12);color:var(--green);padding:5px 12px;border-radius:22px;border:1px solid rgba(60,181,74,.3);}
.mobile-tabs{display:none;background:var(--card);border-bottom:1px solid var(--border2);padding:0 8px;overflow-x:auto;gap:2px;flex-shrink:0;}
.mobile-tabs::-webkit-scrollbar{height:0;}
@media(max-width:680px){.sidebar{display:none!important;}.mobile-tabs{display:flex!important;}}
.layout{display:flex;min-height:calc(100vh - 53px);}
.sidebar{width:200px;background:var(--card);border-right:1px solid var(--border2);padding:10px 8px;flex-shrink:0;}
.snav{display:block;padding:10px 13px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);transition:all .2s;margin-bottom:2px;white-space:nowrap;}
.snav:hover{color:var(--text);background:var(--card2);}
.snav.active{background:rgba(60,181,74,.1);color:var(--green);border-left:3px solid var(--green);}
.snav .si{margin-right:8px;}
.msnav{padding:11px 14px;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;font-family:'Bebas Neue',sans-serif;letter-spacing:.5px;}
.msnav.active{color:var(--green);border-bottom-color:var(--green);}
.content{flex:1;padding:16px;overflow-x:hidden;}
.pg{display:none;}.pg.active{display:block;}
.pg-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#fff;margin-bottom:14px;letter-spacing:1px;}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px;margin-bottom:18px;}
.stat{
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid var(--border2);border-radius:var(--r);padding:14px;
  position:relative;overflow:hidden;
}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--navy3,#1d3470),var(--green));}
.sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;}
.sv.g{color:var(--green)}.sv.r{color:var(--red)}.sv.go{color:var(--gold)}.sv.b{color:var(--blue)}
.tbl{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.tr{padding:13px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.tr:last-child{border-bottom:none;}
.tr-name{font-weight:800;font-size:14px;color:#fff;margin-bottom:2px;}
.tr-sub{font-size:11px;color:var(--muted);line-height:1.5;}
.tr-act{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.chip{display:inline-block;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:800;letter-spacing:.5px;}
.cg{background:rgba(60,181,74,.15);color:var(--green);border:1px solid rgba(60,181,74,.25);}
.cr{background:rgba(231,76,60,.15);color:var(--red);border:1px solid rgba(231,76,60,.25);}
.cgo{background:rgba(240,192,64,.15);color:var(--gold);border:1px solid rgba(240,192,64,.25);}
.cb{background:rgba(61,142,240,.15);color:var(--blue);border:1px solid rgba(61,142,240,.25);}
.search{
  width:100%;background:var(--card);border:1.5px solid var(--border2);
  border-radius:9px;padding:10px 13px;color:var(--text);font-size:13px;
  font-family:inherit;outline:none;margin-bottom:11px;transition:all .2s;
}
.search:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(60,181,74,.08);}
.add-form{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border2);border-radius:var(--r);padding:16px;margin-bottom:16px;}
.add-form h3{font-size:16px;margin-bottom:12px;color:#fff;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px;}
@media(max-width:500px){.frow{grid-template-columns:1fr;}}
.empty{text-align:center;padding:28px;color:var(--muted);font-size:13px;}
.pending-badge{background:rgba(240,192,64,.1);color:var(--gold);font-size:12px;padding:6px 12px;border-radius:9px;margin-bottom:10px;display:inline-block;font-weight:700;border:1px solid rgba(240,192,64,.25);}
.reply-inp{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;margin-bottom:6px;}
.reply-inp:focus{border-color:var(--green);}
.sep{border:none;border-top:1px solid var(--border);margin:14px 0;}
.toast{position:fixed;top:18px;right:18px;background:var(--card2);color:var(--text);padding:11px 18px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;border:1px solid var(--border2);transform:translateY(-8px);font-weight:700;backdrop-filter:blur(8px);}
.toast.show{opacity:1;transform:translateY(0);}
.toast.tg{border-color:var(--green);color:var(--green);}
.toast.tr{border-color:var(--red);color:var(--red);}
.toast.tgo{border-color:var(--gold);color:var(--gold);}
/* Settle box */
.settle-box{background:var(--card2);border:1.5px solid var(--gold);border-radius:10px;padding:14px;margin-bottom:12px;}
.settle-box .sb-title{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--gold);margin-bottom:4px;}
.settle-box .sb-sub{font-size:12px;color:var(--muted);margin-bottom:10px;}
.settle-box .sb-teams{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.settle-box .team-btn{flex:1;min-width:120px;padding:10px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;}
.settle-box .team-btn:hover{border-color:var(--green);color:var(--green);}
.settle-box .team-btn.selected{border-color:var(--green);background:rgba(46,204,64,.12);color:var(--green);}
/* Screenshot modal */
.ss-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;}
.ss-modal.open{display:flex;}
.ss-modal img{max-width:90vw;max-height:90vh;border-radius:10px;border:2px solid var(--border);}
.ss-close{position:fixed;top:18px;right:18px;background:var(--red);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;}
/* Match status badge */
.status-open{background:rgba(46,204,64,.15);color:var(--green);border:1px solid rgba(46,204,64,.3);}
.status-closed{background:rgba(240,192,64,.15);color:var(--gold);border:1px solid rgba(240,192,64,.3);}
.status-settled{background:rgba(52,152,219,.15);color:var(--blue);border:1px solid rgba(52,152,219,.3);}
.status-cancelled{background:rgba(231,76,60,.15);color:var(--red);border:1px solid rgba(231,76,60,.3);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="ss-modal" id="ssModal" onclick="closeSS()">
  <button class="ss-close" onclick="closeSS()">✕</button>
  <img id="ssImg" src="" alt="Payment Screenshot">
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lcard">
    <h2>🔐 TOSSIFY ADMIN</h2>
    <p>Restricted access — Control Panel</p>
    <div class="field"><label>Username</label><input id="aUser" placeholder="admin" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="aPass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-green btn-full" onclick="doLogin()">ACCESS PANEL</button>
    <div class="msg" id="aMsg"></div>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <div class="header">
    <h2>🪙 TOSSIFY ADMIN PANEL</h2>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="hlive" id="hlive">● Live</span>
      <button class="btn btn-outline" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="mobile-tabs" id="mobileTabs">
    <div class="msnav active" onclick="goPage('dashboard',this)">📊 Dash</div>
    <div class="msnav" onclick="goPage('users',this)">👥 Users</div>
    <div class="msnav" onclick="goPage('deposits',this)">💳 Deposits</div>
    <div class="msnav" onclick="goPage('withdrawals',this)">🏦 Withdraw</div>
    <div class="msnav" onclick="goPage('bets',this)">🎯 Bets</div>
    <div class="msnav" onclick="goPage('matches',this)">🏏 Matches</div>
    <div class="msnav" onclick="goPage('tickets',this)">🎫 Support</div>
    <div class="msnav" onclick="goPage('settings',this)">⚙️ Settings</div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="snav active" onclick="goPage('dashboard',this)"><span class="si">📊</span>Dashboard</div>
      <div class="snav" onclick="goPage('users',this)"><span class="si">👥</span>Users</div>
      <div class="snav" onclick="goPage('deposits',this)"><span class="si">💳</span>Deposits</div>
      <div class="snav" onclick="goPage('withdrawals',this)"><span class="si">🏦</span>Withdrawals</div>
      <div class="snav" onclick="goPage('bets',this)"><span class="si">🎯</span>Bets</div>
      <div class="snav" onclick="goPage('matches',this)"><span class="si">🏏</span>Matches</div>
      <div class="snav" onclick="goPage('tickets',this)"><span class="si">🎫</span>Support</div>
      <div class="snav" onclick="goPage('settings',this)"><span class="si">⚙️</span>Settings</div>
    </div>
    <div class="content">
      <div class="pg active" id="pg-dashboard"></div>
      <div class="pg" id="pg-users"></div>
      <div class="pg" id="pg-deposits"></div>
      <div class="pg" id="pg-withdrawals"></div>
      <div class="pg" id="pg-bets"></div>
      <div class="pg" id="pg-matches"></div>
      <div class="pg" id="pg-tickets"></div>
      <div class="pg" id="pg-settings"></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let ATOKEN = sessionStorage.getItem('a_tok') || '';
let DB = { users:[], adminMatches:[], allMatches:[], bets:[], deposits:[], withdrawals:[], tickets:[], depositAccount:{}, settledMatches:{}, maintenance: false };
let currentPage = 'dashboard';
let userQuery = '';

function toast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' t'+type:'');
  setTimeout(()=>t.className='toast',3000);
}
async function api(method,url,body){
  const r=await fetch(url,{method,headers:{'Content-Type':'application/json','x-token':ATOKEN},body:body?JSON.stringify(body):undefined});
  return r.json();
}

// Screenshot modal
function viewSS(src) {
  document.getElementById('ssImg').src = src;
  document.getElementById('ssModal').classList.add('open');
}
function closeSS() {
  document.getElementById('ssModal').classList.remove('open');
}

async function doLogin(){
  const u=document.getElementById('aUser').value.trim();
  const p=document.getElementById('aPass').value;
  const msg=document.getElementById('aMsg');
  const r=await api('POST','/api/admin/login',{username:u,password:p});
  if(r.ok){
    ATOKEN=r.token; sessionStorage.setItem('a_tok',ATOKEN);
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainScreen').style.display='block';
    socket.emit('admin:join',ATOKEN);
    await loadAll();
  } else { msg.className='msg err'; msg.textContent=r.msg; }
}

async function doLogout(){
  await api('POST','/api/admin/logout');
  ATOKEN=''; sessionStorage.removeItem('a_tok');
  location.reload();
}

async function loadAll(){
  const r=await api('GET','/api/admin/data');
  if(!r.ok) return;
  DB=r;
  renderPage(currentPage);
}

if(ATOKEN){
  api('GET','/api/admin/data').then(r=>{
    if(r.ok){
      DB=r;
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('mainScreen').style.display='block';
      socket.emit('admin:join',ATOKEN);
      renderPage('dashboard');
    }
  });
}

socket.on('db:bets',        d=>{DB.bets=d;       if(currentPage==='bets'||currentPage==='dashboard') renderPage(currentPage);});
socket.on('db:deposits',    d=>{DB.deposits=d;    if(currentPage==='deposits'||currentPage==='dashboard') renderPage(currentPage);});
socket.on('db:withdrawals', d=>{DB.withdrawals=d; if(currentPage==='withdrawals'||currentPage==='dashboard') renderPage(currentPage);});
socket.on('db:tickets',     d=>{DB.tickets=d;     if(currentPage==='tickets'||currentPage==='dashboard') renderPage(currentPage);});
socket.on('matches:update', d=>{DB.allMatches=d.matches; if(currentPage==='matches'||currentPage==='dashboard') renderPage(currentPage);});

function goPage(name, el){
  document.querySelectorAll('.snav,.msnav').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.snav,.msnav').forEach(n=>{
    const txt=n.textContent.replace(/[^a-zA-Z]/g,'').toLowerCase();
    const target=name.toLowerCase();
    if(txt.includes(target)||target.includes(txt.slice(0,4))) n.classList.add('active');
  });
  // Reset user search input element so it rebuilds on next visit
  if(name!=='users'){ userQuery=''; document.getElementById('pg-users').innerHTML=''; }
  currentPage=name;
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+name).classList.add('active');
  renderPage(name);
}

function renderPage(n){
  if(n==='dashboard')        renderDash();
  else if(n==='users')       renderUsers();
  else if(n==='deposits')    renderDeposits();
  else if(n==='withdrawals') renderWithdrawals();
  else if(n==='bets')        renderBets();
  else if(n==='matches')     renderMatches();
  else if(n==='tickets')     renderTickets();
  else if(n==='settings')    renderSettings();
}

async function toggleMaintenance(){
  const enabled = !DB.maintenance;
  const r = await api('POST','/api/admin/maintenance',{enabled});
  if(r.ok){ DB.maintenance=r.maintenance; renderPage('dashboard'); toast(r.maintenance?'🔧 Maintenance ON — site locked for users':'✅ Maintenance OFF — site is live', r.maintenance?'go':'g'); }
  else toast('Error toggling maintenance','r');
}

// ─── DASHBOARD ───────────────────────────────────────────────
function renderDash(){
  const el=document.getElementById('pg-dashboard');
  const totDep=DB.deposits.filter(d=>d.status==='Approved').reduce((s,d)=>s+d.amount,0);
  const totWith=DB.withdrawals.filter(w=>w.status==='Approved').reduce((s,w)=>s+w.amount,0);
  const pendBets=DB.bets.filter(b=>b.status==='Pending').length;
  const unsettledMatches = (DB.allMatches||[]).filter(m=>!m.settled);
  const maintOn = DB.maintenance;
  el.innerHTML=`<div class="pg-title">Dashboard</div>
  <div style="margin-bottom:18px;background:${maintOn?'rgba(231,76,60,.1)':'rgba(60,181,74,.07)'};border:1.5px solid ${maintOn?'rgba(231,76,60,.4)':'rgba(60,181,74,.25)'};border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;">
    <div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:${maintOn?'var(--red)':'var(--green)'};">🔧 Maintenance Mode</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">${maintOn?'Site is LOCKED for all users (demo allowed)':'Site is LIVE — all users can access normally'}</div>
    </div>
    <button class="btn ${maintOn?'btn-red':'btn-green'}" style="min-width:160px;" onclick="toggleMaintenance()">${maintOn?'🟢 TURN OFF MAINTENANCE':'🔴 ENABLE MAINTENANCE'}</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="sl">Total Users</div><div class="sv g">${DB.users.length}</div></div>
    <div class="stat"><div class="sl">Total Bets</div><div class="sv b">${DB.bets.length}</div></div>
    <div class="stat"><div class="sl">Pending Bets</div><div class="sv go">${pendBets}</div></div>
    <div class="stat"><div class="sl">Pending Dep</div><div class="sv go">${DB.deposits.filter(d=>d.status==='Pending').length}</div></div>
    <div class="stat"><div class="sl">Pending With</div><div class="sv go">${DB.withdrawals.filter(w=>w.status==='Pending').length}</div></div>
    <div class="stat"><div class="sl">Total Deposited</div><div class="sv g">₹${totDep.toFixed(0)}</div></div>
    <div class="stat"><div class="sl">Total Withdrawn</div><div class="sv r">₹${totWith.toFixed(0)}</div></div>
    <div class="stat"><div class="sl">Active Matches</div><div class="sv g">${unsettledMatches.length}</div></div>
    <div class="stat"><div class="sl">Open Tickets</div><div class="sv go">${DB.tickets.filter(t=>t.status==='Open').length}</div></div>
  </div>
  ${pendBets?`<div class="pending-badge">⚠️ ${pendBets} unsettled bet${pendBets>1?'s':''} — go to Matches to settle</div>`:''}
  <div class="pg-title" style="font-size:18px;margin-bottom:10px;">Recent Bets</div>
  <div class="tbl">${DB.bets.slice(0,8).map(b=>`
    <div class="tr">

// ─── MATCHES ─── KEY: settle/cancel per match ────────────────
function getMatchStatus(m) {
  const settled = (DB.settledMatches||{})[m.id];
  if (settled) return settled.action === 'cancel' ? 'cancelled' : 'settled';
  if (!m.bettingOpen) return 'closed'; // time passed, not yet settled
  return 'open';
}

function renderMatches(){
  const el=document.getElementById('pg-matches');
  const allM = DB.allMatches || [];
  const unsettled = allM.filter(m => !((DB.settledMatches||{})[m.id]));
  const settled   = allM.filter(m =>  ((DB.settledMatches||{})[m.id]));

  const matchCards = unsettled.map(m => {
    const status = getMatchStatus(m);
    const settled = (DB.settledMatches||{})[m.id];
    const pendingBets = DB.bets.filter(b=>b.matchId===m.id && b.status==='Pending');
    const matchLabel = `${m.teamA} vs ${m.teamB}`;
    const mIdSafe = m.id.replace(/[^a-zA-Z0-9_]/g,'_');
    const statusBadge =
      status==='open'      ? `<span class="chip status-open">🟢 Betting Open</span>` :
      status==='closed'    ? `<span class="chip status-closed">🔒 Betting Closed</span>` :
      status==='settled'   ? `<span class="chip status-settled">✅ Settled</span>` :
                             `<span class="chip status-cancelled">❌ Cancelled</span>`;

    const settleSection = !settled ? `
      <div class="settle-box">
        <div class="sb-title">🏆 Settle or Cancel Match</div>
        <div class="sb-sub">${pendingBets.length} pending bet${pendingBets.length!==1?'s':''} • Select winner and click Settle, or Cancel to void all bets</div>

          <button class="team-btn" id="tb_${mIdSafe}_a" onclick="selectWinner('${mIdSafe}','${m.teamA.replace(/'/g,"\\'")}')">🏏 ${m.teamA}</button>

          <button class="btn btn-green" onclick="settleMatchAdmin('${m.id}','${m.teamA.replace(/'/g,"\\'")}','${m.teamB.replace(/'/g,"\\'")}','${mIdSafe}')">✅ SETTLE BETS</button>
          <button class="btn btn-red" onclick="cancelMatchAdmin('${m.id}','${matchLabel.replace(/'/g,"\\'")}')">❌ CANCEL (Refund All)</button>
        </div>
      </div>` : `<div style="font-size:12px;color:var(--muted);margin-top:6px;">Settled at ${(DB.settledMatches||{})[m.id]?.settledAt||''}</div>`;

    return `<div class="tr">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;">
        <div>
          <div class="tr-name">${m.teamA} vs ${m.teamB}</div>
          <div class="tr-sub">⏰ Toss/Close: ${m.time||'TBD'} • Source: ${m.source||'admin'} • ${pendingBets.length} pending bets</div>
        </div>

          ${statusBadge}

        </div>

    </div>`;
  }).join('');

    <div class="pg-title" style="font-size:16px;margin:14px 0 8px;">Settled / Cancelled Matches</div>
    <div class="tbl">${settled.map(m=>{

// Track selected winners per match
const selectedWinners = {};
function selectWinner(mIdSafe, team) {
  selectedWinners[mIdSafe] = team;
  // highlight selected button
  const btns = document.querySelectorAll(`[id^="tb_${mIdSafe}_"]`);
  btns.forEach(b => {
    b.classList.toggle('selected', b.textContent.includes(team));
  });
}

async function settleMatchAdmin(matchId, teamA, teamB, mIdSafe) {
  const winner = selectedWinners[mIdSafe];
  if (!winner) {
    toast('Please select a winner first (click a team button)', 'r');
    return;
  }
  const pendingCount = DB.bets.filter(b=>b.matchId===matchId && b.status==='Pending').length;
  if (!confirm(`Settle ${pendingCount} bet(s) for this match?\n\n🏆 Winner: ${winner}\n\nAll users who backed "${winner}" will receive their winnings instantly.`)) return;
  const r = await api('POST', '/api/admin/match/settle', { matchId, action: 'settle', winnerTeam: winner });
  if (r.ok) {
    toast(`✅ Match settled! ${r.settled} bets processed. Winnings sent!`, 'g');
    delete selectedWinners[mIdSafe];
    await loadAll();
  } else toast(r.msg || 'Failed', 'r');
}

async function cancelMatchAdmin(matchId, matchLabel) {
  const pendingCount = DB.bets.filter(b=>b.matchId===matchId && b.status==='Pending').length;
  if (!confirm(`Cancel match: "${matchLabel}"?\n\nAll ${pendingCount} pending bets will be VOIDED and full bet amounts refunded to each user.`)) return;
  const r = await api('POST', '/api/admin/match/settle', { matchId, action: 'cancel' });
  if (r.ok) {
    toast(`❌ Match cancelled. ${r.settled} bets refunded.`, 'go');
    await loadAll();
  } else toast(r.msg || 'Failed', 'r');
}

let newQrBase64 = null;
function previewQR(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    newQrBase64 = e.target.result;
    document.getElementById('qrPreviewImg').src = newQrBase64;
    document.getElementById('qrPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}
async function removeQR() {
  if (!confirm('Remove QR code?')) return;
  newQrBase64 = '';
  const a = DB.depositAccount || {};
  const r = await api('POST', '/api/admin/deposit-account', {
    bank: a.bank, acc: a.acc, ifsc: a.ifsc, upi: a.upi, qrImage: null
  });
  if (r.ok) { toast('QR code removed', 'r'); newQrBase64 = null; await loadAll(); }
}
async function saveDepositAccount() {
  const bank = document.getElementById('saBank').value.trim();
  const acc  = document.getElementById('saAcc').value.trim();
  const ifsc = document.getElementById('saIfsc').value.trim();
  const upi  = document.getElementById('saUpi').value.trim();
  if (!bank || !acc || !ifsc || !upi) { toast('All bank fields required', 'r'); return; }
  const body = { bank, acc, ifsc, upi };
  if (newQrBase64 !== null) body.qrImage = newQrBase64;
  const r = await api('POST', '/api/admin/deposit-account', body);
  if (r.ok) {
    toast('Settings saved! Users see changes immediately.', 'g');
    newQrBase64 = null;
    await loadAll();
  } else toast(r.msg || 'Failed', 'r');
}
</script>
</body>
</html>
